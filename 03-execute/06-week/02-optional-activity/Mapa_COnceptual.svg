<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 24px Arial; fill: #222; }
    .subtitle { font: bold 18px Arial; fill: #333; }
    .text { font: 14px Arial; fill: #444; }
    .box { fill: #f8f9fa; stroke: #333; stroke-width: 2; rx: 12; ry: 12; }
    .line { stroke: #555; stroke-width: 2; }
  </style>

  <!-- Nodo central -->
  <rect x="420" y="40" width="360" height="80" class="box"/>
  <text x="600" y="75" text-anchor="middle" class="title">
    Instrumentos de Recolección
  </text>
  <text x="600" y="100" text-anchor="middle" class="title">
    de Información
  </text>

  <!-- Línea principal -->
  <line x1="600" y1="120" x2="600" y2="180" class="line"/>

  <!-- Definición -->
  <rect x="390" y="180" width="420" height="80" class="box"/>
  <text x="600" y="210" text-anchor="middle" class="subtitle">
    ¿Qué son?
  </text>
  <text x="600" y="235" text-anchor="middle" class="text">
    Herramientas para obtener, registrar
  </text>
  <text x="600" y="255" text-anchor="middle" class="text">
    y organizar datos
  </text>

  <!-- Líneas a ramas -->
  <line x1="600" y1="260" x2="250" y2="340" class="line"/>
  <line x1="600" y1="260" x2="950" y2="340" class="line"/>
  <line x1="600" y1="260" x2="600" y2="340" class="line"/>

  <!-- Tipos -->
  <rect x="80" y="340" width="340" height="220" class="box"/>
  <text x="250" y="370" text-anchor="middle" class="subtitle">
    Tipos principales
  </text>
  <text x="100" y="410" class="text">• Encuesta</text>
  <text x="100" y="440" class="text">• Entrevista</text>
  <text x="100" y="470" class="text">• Observación</text>
  <text x="100" y="500" class="text">• Cuestionario</text>
  <text x="100" y="530" class="text">• Lista de chequeo</text>
  <text x="100" y="560" class="text">• Revisión documental</text>

  <!-- Importancia -->
  <rect x="440" y="340" width="320" height="220" class="box"/>
  <text x="600" y="370" text-anchor="middle" class="subtitle">
    Importancia
  </text>
  <text x="460" y="410" class="text">• Identificar problemas</text>
  <text x="460" y="440" class="text">• Conocer necesidades</text>
  <text x="460" y="470" class="text">• Tomar decisiones</text>
  <text x="460" y="500" class="text">• Diseñar soluciones</text>
  <text x="460" y="530" class="text">• Validar información</text>

  <!-- Aplicación -->
  <rect x="780" y="340" width="340" height="220" class="box"/>
  <text x="950" y="370" text-anchor="middle" class="subtitle">
    Aplicación en Software
  </text>
  <text x="800" y="410" class="text">• Requerimientos funcionales</text>
  <text x="800" y="440" class="text">• Requerimientos no funcionales</text>
  <text x="800" y="470" class="text">• Procesos del negocio</text>
  <text x="800" y="500" class="text">• Necesidades del usuario</text>
</svg>
