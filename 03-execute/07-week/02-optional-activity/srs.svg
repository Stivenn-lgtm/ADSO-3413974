<svg width="800" height="1200" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Fondo -->
  <rect width="100%" height="100%" fill="#f4f6f8"/>

  <!-- Título -->
  <text x="400" y="60" font-size="32" text-anchor="middle" fill="#2c3e50" font-weight="bold">
    SRS - Software Requirements Specification
  </text>

  <!-- Sección: Qué es -->
  <rect x="50" y="100" width="700" height="120" rx="15" fill="#3498db"/>
  <text x="70" y="140" font-size="20" fill="white" font-weight="bold">¿Qué es?</text>
  <text x="70" y="170" font-size="16" fill="white">
    Documento que define qué debe hacer un sistema y cómo debe comportarse.
  </text>

  <!-- Objetivo -->
  <rect x="50" y="250" width="700" height="140" rx="15" fill="#2ecc71"/>
  <text x="70" y="290" font-size="20" fill="white" font-weight="bold">Objetivo</text>
  <text x="70" y="320" font-size="16" fill="white">
    - Guía para desarrollo
  </text>
  <text x="70" y="345" font-size="16" fill="white">
    - Evitar malentendidos
  </text>
  <text x="70" y="370" font-size="16" fill="white">
    - Definir requisitos claros
  </text>

  <!-- Componentes -->
  <rect x="50" y="420" width="700" height="200" rx="15" fill="#9b59b6"/>
  <text x="70" y="460" font-size="20" fill="white" font-weight="bold">Componentes</text>
  <text x="70" y="490" font-size="16" fill="white">
    - Introducción
  </text>
  <text x="70" y="515" font-size="16" fill="white">
    - Descripción general
  </text>
  <text x="70" y="540" font-size="16" fill="white">
    - Requisitos funcionales
  </text>
  <text x="70" y="565" font-size="16" fill="white">
    - Requisitos no funcionales
  </text>

  <!-- Tipos de requisitos -->
  <rect x="50" y="650" width="340" height="200" rx="15" fill="#e67e22"/>
  <text x="70" y="690" font-size="18" fill="white" font-weight="bold">
    Funcionales
  </text>
  <text x="70" y="720" font-size="14" fill="white">
    Definen qué hace el sistema:
  </text>
  <text x="70" y="745" font-size="14" fill="white">
    - Login de usuario
  </text>
  <text x="70" y="770" font-size="14" fill="white">
    - Procesar pagos
  </text>

  <rect x="410" y="650" width="340" height="200" rx="15" fill="#e74c3c"/>
  <text x="430" y="690" font-size="18" fill="white" font-weight="bold">
    No funcionales
  </text>
  <text x="430" y="720" font-size="14" fill="white">
    Cómo se comporta:
  </text>
  <text x="430" y="745" font-size="14" fill="white">
    - Rendimiento
  </text>
  <text x="430" y="770" font-size="14" fill="white">
    - Seguridad
  </text>

  <!-- Características -->
  <rect x="50" y="880" width="700" height="180" rx="15" fill="#1abc9c"/>
  <text x="70" y="920" font-size="20" fill="white" font-weight="bold">
    Características de un buen SRS
  </text>
  <text x="70" y="950" font-size="16" fill="white">
    - Claro y preciso
  </text>
  <text x="70" y="975" font-size="16" fill="white">
    - Completo
  </text>
  <text x="70" y="1000" font-size="16" fill="white">
    - Verificable
  </text>
  <text x="70" y="1025" font-size="16" fill="white">
    - Consistente
  </text>

  <!-- Footer -->
  <text x="400" y="1150" font-size="14" text-anchor="middle" fill="#7f8c8d">
    Infografía SRS - Ingeniería de Software
  </text>

</svg>
